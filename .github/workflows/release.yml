name: Release macOS App

on:
  push:
    tags: ['v*']

jobs:
  build-sign-notarize:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # ── Import Developer ID certificate ──────────────────────────────────
      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/developer_id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$DEVELOPER_ID_CERT_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$DEVELOPER_ID_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild \
            -A
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          curl -sL "https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer" -o "$RUNNER_TEMP/DeveloperIDG2CA.cer"
          security import "$RUNNER_TEMP/DeveloperIDG2CA.cer" -k "$KEYCHAIN_PATH" -T /usr/bin/codesign

          echo "Verifying code signing identity..."
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      # ── Build archive ────────────────────────────────────────────────────
      - name: Archive
        run: |
          xcodebuild archive \
            -project CombAnalyser.xcodeproj \
            -scheme CombAnalyser \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/CombAnalyser.xcarchive" \
            -destination "generic/platform=macOS" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="6CV9KJ5VSK" \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options=runtime"

      # ── Export .app ──────────────────────────────────────────────────────
      - name: Export .app
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/CombAnalyser.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist ci/ExportOptions-DeveloperID.plist

      # ── Create DMG ───────────────────────────────────────────────────────
      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          create-dmg \
            --volname "CombAnalyser ${{ github.ref_name }}" \
            --icon "CombAnalyser.app" 200 190 \
            --hide-extension "CombAnalyser.app" \
            --app-drop-link 600 185 \
            --filesystem APFS \
            "$RUNNER_TEMP/CombAnalyser-${{ github.ref_name }}.dmg" \
            "$RUNNER_TEMP/export/" || true
            # create-dmg exits 1 when no signing identity is passed for the DMG itself — that's fine,
            # the .app inside is already signed and we sign the DMG in the next step if needed.

      # ── Notarize the .app (via zip), then staple ─────────────────────────
      - name: Notarize app
        env:
          NOTARIZATION_APPLE_ID: ${{ secrets.NOTARIZATION_APPLE_ID }}
          NOTARIZATION_PASSWORD: ${{ secrets.NOTARIZATION_PASSWORD }}
          NOTARIZATION_TEAM_ID: ${{ secrets.NOTARIZATION_TEAM_ID }}
        run: |
          ditto -c -k --keepParent \
            "$RUNNER_TEMP/export/CombAnalyser.app" \
            "$RUNNER_TEMP/CombAnalyser-notarize.zip"

          SUBMIT_OUTPUT=$(xcrun notarytool submit "$RUNNER_TEMP/CombAnalyser-notarize.zip" \
            --apple-id "$NOTARIZATION_APPLE_ID" \
            --password "$NOTARIZATION_PASSWORD" \
            --team-id "$NOTARIZATION_TEAM_ID" \
            --wait \
            --timeout 600 2>&1) || true

          echo "$SUBMIT_OUTPUT"

          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep -o '[0-9a-f\-]\{36\}' | head -1)

          if echo "$SUBMIT_OUTPUT" | grep -q "status: Invalid"; then
            echo "Notarization rejected. Fetching log..."
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$NOTARIZATION_APPLE_ID" \
              --password "$NOTARIZATION_PASSWORD" \
              --team-id "$NOTARIZATION_TEAM_ID" || true
            exit 1
          fi

          xcrun stapler staple "$RUNNER_TEMP/export/CombAnalyser.app"

      # ── Recreate DMG with stapled app ────────────────────────────────────
      - name: Recreate DMG with stapled app
        run: |
          rm -f "$RUNNER_TEMP/CombAnalyser-${{ github.ref_name }}.dmg"
          create-dmg \
            --volname "CombAnalyser ${{ github.ref_name }}" \
            --icon "CombAnalyser.app" 200 190 \
            --hide-extension "CombAnalyser.app" \
            --app-drop-link 600 185 \
            --filesystem APFS \
            "$RUNNER_TEMP/CombAnalyser-${{ github.ref_name }}.dmg" \
            "$RUNNER_TEMP/export/" || true

      # ── Create ZIP ───────────────────────────────────────────────────────
      - name: Create ZIP
        run: |
          ditto -c -k --keepParent \
            "$RUNNER_TEMP/export/CombAnalyser.app" \
            "$RUNNER_TEMP/CombAnalyser-${{ github.ref_name }}.zip"

      # ── Upload to GitHub Release ─────────────────────────────────────────
      - name: Upload release artifacts
        run: |
          gh release upload "${{ github.ref_name }}" \
            "$RUNNER_TEMP/CombAnalyser-${{ github.ref_name }}.dmg" \
            "$RUNNER_TEMP/CombAnalyser-${{ github.ref_name }}.zip" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Cleanup ──────────────────────────────────────────────────────────
      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
          rm -f "$RUNNER_TEMP/developer_id.p12"
